<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diet Coach Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Diet Coach / Personal Trainer</p>
        <h1>79kgへ落としながら、仕事で動ける体を作る</h1>
        <p class="lead" id="heroLead"></p>
      </div>
      <div class="hero-metrics" id="heroMetrics"></div>
    </section>

    <section class="command-grid">
      <section class="panel command-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Today</p>
            <h2>今日の指示</h2>
          </div>
          <span class="pill" id="topPriority"></span>
        </div>
        <div id="coachActions"></div>
      </section>
      <section class="panel radar-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Condition Pentagon</p>
            <h2>5角形パラメータ</h2>
          </div>
        </div>
        <div id="radar"></div>
      </section>
    </section>

    <section class="kpis" id="kpis"></section>

    <section class="workout-grid">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Training</p>
            <h2>今週の筋トレメニュー</h2>
          </div>
        </div>
        <div id="strengthPlan"></div>
      </section>
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Diet</p>
            <h2>今日の食事ルール</h2>
          </div>
        </div>
        <div id="dietPlan"></div>
      </section>
    </section>

    <section class="panel chart-panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Trend</p>
          <h2>推移グラフ</h2>
        </div>
        <div class="tabs" id="metricTabs"></div>
      </div>
      <div class="chart" id="chart"></div>
    </section>

    <section class="lower-grid">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Goal</p>
            <h2>79kg目標</h2>
          </div>
        </div>
        <div id="weightGoal"></div>
      </section>
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Data</p>
            <h2>取得状態</h2>
          </div>
        </div>
        <div id="dataStatus"></div>
      </section>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Log</p>
          <h2>日別データ</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>状態</th>
              <th>睡眠</th>
              <th>歩数</th>
              <th>活動kcal</th>
              <th>体重</th>
              <th>体脂肪</th>
              <th>BMI</th>
            </tr>
          </thead>
          <tbody id="dailyRows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
